<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agenda</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 40px;
        }

        .container {
            width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(to right, #874597, #c5afbd);
            color: white;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #a169a7;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(to right, #874597, #c5afbd);
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Agenda</h1>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>E-mail</th>
                    <th>Observação</th>
                </tr>
            </thead>
            <tbody id="listaAgenda"></tbody>
        </table>
        <button onclick="window.location.href='cadastro.html'">Cadastro</button>
        <button onclick="voltar()">Voltar</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
