<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Clientes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 40px;
        }

        .container {
            width: 700px;
            margin: auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            word-break: break-word;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #a169a7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: linear-gradient(to right, #874597, #c5afbd);
        }

        h2 {
            margin-top: 40px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(to right, #874597, #c5afbd);
            color: white;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
            word-break: break-word;
            max-width: 150px;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Cadastro de Clientes</h1>

        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Ex: Maria da Silva" maxlength="50">
        </div>

        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="Ex: exemplo@exemplo.com" maxlength="50">
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" placeholder="Ex: (00) 00000 - 0000" maxlength="15">
        </div>

        <button onclick="cadastrarCliente()">Cadastrar</button>
        <br><br>
       <button onclick="window.location.href='agenda.html'">Agenda</button>

        <br><br>
        <button onclick="voltar()">Voltar</button>

        <h2>Lista de Clientes</h2>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                </tr>
            </thead>

            <tbody id="tabelaClientes">
            </tbody>
        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
