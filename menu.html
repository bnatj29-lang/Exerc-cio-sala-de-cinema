<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Menu</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #874597, #c5afbd);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .menu {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        button {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(to right, #874597, #c5afbd);
            color: white;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="menu">
        <h1>Menu</h1>

        <button onclick="window.location.href='cadastro.html'">
            Cadastro
        </button>

        <button onclick="window.location.href='agenda.html'">
            Agenda
        </button>
    </div>

</body>

</html>
